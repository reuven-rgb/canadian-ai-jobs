<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap');
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px; height: 1200px;
    font-family: 'Inter', -apple-system, sans-serif;
    background: #0a0e17;
    color: #e2e8f0;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }
  body::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.018) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.018) 1px, transparent 1px);
    background-size: 80px 80px;
  }
  .glow {
    position: absolute;
    width: 700px; height: 700px;
    border-radius: 50%;
    filter: blur(150px);
    opacity: 0.1;
  }
  .glow-1 { background: #ef4444; top: -250px; left: -150px; }
  .glow-2 { background: #8b5cf6; bottom: -250px; right: -150px; }

  .content {
    position: relative; z-index: 1;
    text-align: center;
    padding: 0 80px;
  }
  .tag {
    display: inline-block;
    font-size: 16px;
    font-weight: 700;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #3b82f6;
    background: rgba(59,130,246,0.1);
    padding: 10px 28px;
    border-radius: 30px;
    margin-bottom: 48px;
  }
  h1 {
    font-size: 82px;
    font-weight: 900;
    line-height: 1.05;
    margin-bottom: 60px;
    letter-spacing: -2px;
  }
  .white {
    background: linear-gradient(135deg, #fff, #c8d6e5);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .red {
    background: linear-gradient(135deg, #ef4444, #f97316);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 48px;
  }
  .stat {
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.06);
    border-radius: 24px;
    padding: 36px 44px;
    text-align: center;
    min-width: 260px;
  }
  .stat-value {
    font-size: 72px;
    font-weight: 900;
    line-height: 1;
  }
  .stat-value.red { color: #ef4444; }
  .stat-value.amber { color: #f59e0b; }
  .stat-value.blue { color: #3b82f6; }
  .stat-label {
    font-size: 18px;
    color: #64748b;
    font-weight: 600;
    margin-top: 10px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }

  .source {
    position: absolute;
    bottom: 36px;
    left: 0; right: 0;
    text-align: center;
    font-size: 14px;
    color: #334155;
    z-index: 2;
  }
  .series {
    position: absolute;
    top: 40px;
    right: 48px;
    font-size: 16px;
    color: #475569;
    font-weight: 600;
    letter-spacing: 1px;
    z-index: 2;
  }
</style>
</head>
<body>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <div class="series">1 / 6</div>

  <div class="content">
    <div class="tag">Canadian AI Exposure Analysis</div>
    <h1>
      <span class="white">5.6 Million</span><br>
      <span class="white">Canadian Jobs</span><br>
      <span class="red">Potentially Impacted by AI</span>
    </h1>
    <div class="stats-row">
      <div class="stat">
        <div class="stat-value red">5.6M</div>
        <div class="stat-label">Workers Exposed</div>
      </div>
      <div class="stat">
        <div class="stat-value amber">$450B</div>
        <div class="stat-label">Payroll at Risk</div>
      </div>
      <div class="stat">
        <div class="stat-value blue">28%</div>
        <div class="stat-label">Of Workforce</div>
      </div>
    </div>
  </div>

  <div class="source">Data: StatCan NOC 2021 · ESDC Wages 2025 · Census 2021 · 516 occupations scored</div>
</body>
</html>
